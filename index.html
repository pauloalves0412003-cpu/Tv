<!DOCTYPE html>
<html>
<head>
  <title>Player remoto</title>
</head>
<body>

<h2>Player remoto (Live)</h2>

<video id="player" controls width="600"></video>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>
  var firebaseConfig = {
    apiKey: "AIzaSyD9Lz5Ayn1_zV8u8SWizCL5LSXp6Huzu8Y",
    authDomain: "tv-tv-f74b1.firebaseapp.com",
    databaseURL: "https://tv-tv-f74b1-default-rtdb.firebaseio.com/",
    projectId: "tv-tv-f74b1"
  };

  firebase.initializeApp(firebaseConfig);
  var db = firebase.database();

  var player = document.getElementById("player");
  var hls;

  db.ref("videoUrl").on("value", function(snapshot) {
    var url = snapshot.val();
    if (!url) return;

    // Limpa instância anterior
    if (hls) {
      hls.destroy();
      hls = null;
    }

    // Se for HLS (.m3u8)
    if (url.endsWith(".m3u8")) {
      if (Hls.isSupported()) {
        hls = new Hls();
        hls.loadSource(url);
        hls.attachMedia(player);
        hls.on(Hls.Events.MANIFEST_PARSED, function() {
          player.play();
        });
      } else if (player.canPlayType("application/vnd.apple.mpegurl")) {
        // Safari / iOS
        player.src = url;
        player.addEventListener("loadedmetadata", function() {
          player.play();
        });
      }
    } else {
      // Vídeo normal (mp4, etc)
      player.src = url;
      player.load();
      player.play();
    }
  });
</script>

</body>
</html>
