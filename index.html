<!DOCTYPE html>
<html>
<head>
  <title>TV Remota (modo direto)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="margin:0; background:black; overflow:hidden;">

<!-- Tela inicial -->
<div id="overlay" style="
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  font-size:22px;
  z-index:10;
  cursor:pointer;
">
  Toque para iniciar
</div>

<video id="player" autoplay muted playsinline
  style="width:100vw;height:100vh;object-fit:cover;background:black;">
</video>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
  var firebaseConfig = {
    apiKey: "AIzaSyD9Lz5Ayn1_zV8u8SWizCL5LSXp6Huzu8Y",
    authDomain: "tv-tv-f74b1.firebaseapp.com",
    databaseURL: "https://tv-tv-f74b1-default-rtdb.firebaseio.com/",
    projectId: "tv-tv-f74b1"
  };

  firebase.initializeApp(firebaseConfig);
  var db = firebase.database();

  var player = document.getElementById("player");
  var overlay = document.getElementById("overlay");

  // ▶️ Início (play + fullscreen)
  overlay.addEventListener("click", function () {
    overlay.style.display = "none";

    player.muted = false;

    player.play().catch(function(){});

    if (player.requestFullscreen) {
      player.requestFullscreen();
    } else if (player.webkitRequestFullscreen) {
      player.webkitRequestFullscreen();
    }
  });

  // 🔄 Atualização do vídeo
  db.ref("videoUrl").on("value", function(snapshot) {
    var url = snapshot.val();
    if (!url) return;

    player.style.opacity = 0;

    setTimeout(function() {
      player.src = url;
      player.load();
      player.play().catch(function(){});

      player.style.opacity = 1;
    }, 300);
  });

</script>

</body>
</html>
