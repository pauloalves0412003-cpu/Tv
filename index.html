<!DOCTYPE html>
<html>
<head>
  <title>TV Remota</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="margin:0; background:black; overflow:hidden;">

<!-- Tela inicial -->
<div id="overlay" style="
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  font-size:22px;
  z-index:10;
  cursor:pointer;
">
  Toque para iniciar
</div>

<!-- Botão abrir -->
<button id="openBtn" style="
  position:fixed;
  top:10px;
  right:10px;
  z-index:20;
  padding:8px 12px;
  font-size:14px;
  background:rgba(0,0,0,0.6);
  color:white;
  border:none;
  border-radius:6px;
  cursor:pointer;
">
  Abrir em nova guia
</button>

<video id="player"
  autoplay
  muted
  playsinline
  style="width:100vw;height:100vh;object-fit:cover;background:black;">
</video>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>
  // 🔥 Firebase
  var firebaseConfig = {
    apiKey: "AIzaSyD9Lz5Ayn1_zV8u8SWizCL5LSXp6Huzu8Y",
    authDomain: "tv-tv-f74b1.firebaseapp.com",
    databaseURL: "https://tv-tv-f74b1-default-rtdb.firebaseio.com/",
    projectId: "tv-tv-f74b1"
  };

  firebase.initializeApp(firebaseConfig);
  var db = firebase.database();

  var player = document.getElementById("player");
  var overlay = document.getElementById("overlay");
  var openBtn = document.getElementById("openBtn");

  var hls = null;
  var currentUrl = "";

  // 🔊 Boost
  var audioContext = null;
  var gainNode = null;
  var boostAtivo = false;

  // Watchdog
  var ultimoTempo = 0;
  var travadoDesde = null;
  var jaReproduziu = false;

  // ▶️ Início
  overlay.addEventListener("click", function () {
    overlay.style.display = "none";

    player.muted = false;
    player.volume = 1;

    // liberar áudio para WebAudio
    var ctx = new (window.AudioContext || window.webkitAudioContext)();
    ctx.resume();
    ctx.close();

    player.play().catch(function(){});

    if (player.requestFullscreen) {
      player.requestFullscreen();
    } else if (player.webkitRequestFullscreen) {
      player.webkitRequestFullscreen();
    }
  });

  // 🔄 Firebase vídeo
  db.ref("videoUrl").on("value", function(snapshot) {
    var url = snapshot.val();
    if (!url) return;

    currentUrl = url;
    jaReproduziu = false;
    travadoDesde = null;

    trocarVideo(url);
  });

  // 🔊 Firebase boost
  db.ref("boostAudio").on("value", function(snapshot) {
    var valor = snapshot.val();

    if (valor === true && !boostAtivo) {
      ativarBoost();
      boostAtivo = true;
    }

    if (valor === false && boostAtivo) {
      desativarBoost();
      boostAtivo = false;
    }
  });

  // 🔗 Botão abrir
  openBtn.addEventListener("click", function() {
    if (currentUrl) {
      window.open(currentUrl, "_blank");
    }
  });

  // 🔄 Troca de vídeo
  function trocarVideo(url) {

    player.style.opacity = 0;

    setTimeout(function() {

      if (hls) {
        hls.destroy();
        hls = null;
      }

      if (url.includes(".m3u8")) {

        if (Hls.isSupported()) {
          hls = new Hls({
            liveSyncDurationCount: 3
          });

          hls.loadSource(url);
          hls.attachMedia(player);

          hls.on(Hls.Events.MANIFEST_PARSED, function() {
            player.play();
          });

        } else if (player.canPlayType("application/vnd.apple.mpegurl")) {
          player.src = url;
          player.addEventListener("loadedmetadata", function() {
            player.play();
          });
        }

      } else {
        player.src = url;
        player.load();
        player.play();
      }

      player.style.opacity = 1;

    }, 300);
  }

  // 🔊 Boost ON
  function ativarBoost() {
    if (audioContext) return;

    audioContext = new (window.AudioContext || window.webkitAudioContext)();

    var source = audioContext.createMediaElementSource(player);
    gainNode = audioContext.createGain();

    gainNode.gain.value = 1.8;

    source.connect(gainNode);
    gainNode.connect(audioContext.destination);
  }

  // 🔊 Boost OFF
  function desativarBoost() {
    if (!audioContext) return;

    audioContext.close();
    audioContext = null;
    gainNode = null;
  }

  // 🎬 Eventos
  player.addEventListener("playing", function() {
    jaReproduziu = true;
    travadoDesde = null;
  });

  player.addEventListener("timeupdate", function() {
    if (player.currentTime !== ultimoTempo) {
      ultimoTempo = player.currentTime;
      travadoDesde = null;
    }
  });

  player.addEventListener("waiting", function() {
    if (jaReproduziu) {
      travadoDesde = Date.now();
    }
  });

  // 🔁 Watchdog (5s)
  setInterval(function() {

    if (!jaReproduziu) return;
    if (!travadoDesde) return;

    var tempoTravado = (Date.now() - travadoDesde) / 1000;

    if (tempoTravado > 5) {
      recarregarStream();
      travadoDesde = null;
    }

  }, 3000);

  function recarregarStream() {

    if (!currentUrl) return;

    if (hls) {
      hls.destroy();
      hls = null;
    }

    player.src = "";
    player.load();

    setTimeout(function() {
      trocarVideo(currentUrl);
    }, 500);
  }

  // 🔁 Fallback live
  setInterval(function() {
    if (hls && player.readyState === 0 && jaReproduziu) {
      hls.startLoad();
    }
  }, 5000);

</script>

</body>
</html>
